version: 2
updates:
  # 1. Monitor Go modules (go.mod / go.sum)
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly" # Checks for updates every week

  # 2. Monitor GitHub Actions (so actions stay up-to-date)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
